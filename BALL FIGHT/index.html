<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Red Ball VS White Ball</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #111;
      font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
    }
    .phone {
      width: min(430px, 100vw);
      aspect-ratio: 9 / 16;
      background: #f5ecdd;
      border-radius: 10px;
      padding: 20px 12px 12px;
      overflow: hidden;
    }
    .titleRow {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 29px;
      font-weight: 1000;
      letter-spacing: -1px;
      text-shadow: 2px 2px white, -2px -2px white, 2px -2px white, -2px 2px white, 4px 4px #111;
    }
    .redText { color: #ff3030; }
    .whiteText { color: white; }
    .vs { color: #111; font-size: 25px; }
    #arena {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: white;
      border: 4px solid #111;
      position: relative;
      overflow: hidden;
    }
    .watermark {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 24px;
      text-align: center;
      color: rgba(0,0,0,.18);
      font-size: 20px;
      font-weight: 1000;
      pointer-events: none;
    }
    .ball {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 1000;
      z-index: 10;
      user-select: none;
      box-shadow: 0 2px 5px rgba(0,0,0,.18);
    }
    .redBall { background: #ff3030; color: white; text-shadow: 2px 2px #111; }
    .whiteBall { background: white; color: #111; }
    .hurtFlash { animation: hurtFlash .16s steps(2, end) 1; }
    @keyframes hurtFlash {
      0% { filter: none; }
      50% { filter: sepia(1) saturate(8) hue-rotate(-40deg) brightness(1.35); }
      100% { filter: none; }
    }
    .skillBar {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .skill {
      height: 58px;
      position: relative;
      border-radius: 4px;
      border: 3px solid #c9a24d;
      background: #f0d7a6;
      box-shadow: 0 0 0 2px #111, inset 0 0 0 3px rgba(255,255,255,.35), 3px 3px 0 #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }
    .whiteSkills .skill {
      border-color: #8fc65b;
      background: #dcefc1;
      box-shadow: 0 0 0 2px #111, inset 0 0 0 3px rgba(255,255,255,.45), 3px 3px 0 #777;
    }
    .skill::after {
      content: attr(data-key);
      position: absolute;
      left: 50%;
      bottom: -20px;
      transform: translateX(-50%);
      color: white;
      font-size: 18px;
      text-shadow: 2px 2px #111, -1px -1px #111;
      z-index: 8;
    }
    .skill .name {
      display: none;
    }
    .skill .emoji {
      font-size: 38px;
      filter: drop-shadow(2px 2px 0 #111);
      z-index: 2;
    }
    .pixelSwordIcon,
    .pixelRodIcon,
    .pixelBowIcon,
    .pixelTurretIcon,
    .pixelHoeIcon,
    .pixelWheatIcon,
    .pixelGolemIcon {
      width: 52px;
      height: 52px;
      object-fit: contain;
      image-rendering: auto;
      z-index: 2;
    }
    .clock {
      position: absolute;
      inset: 0;
      display: none;
      border-radius: 2px;
      background: conic-gradient(rgba(0,0,0,.76) var(--cool, 0deg), rgba(0,0,0,.18) 0deg);
      z-index: 3;
    }
    .clock::after {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.75);
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.45);
    }
    .cd {
      position: absolute;
      right: 4px;
      bottom: 3px;
      min-width: 27px;
      height: 19px;
      padding: 0 4px;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.80);
      color: #ffeb3b;
      border: 1px solid rgba(255,255,255,.55);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 1000;
      z-index: 4;
    }
    .cooling .clock, .cooling .cd { display: flex; }
    .hint {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      font-weight: 900;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 7px 12px;
      background: #111;
      color: white;
      font-weight: 1000;
      cursor: pointer;
    }
    .projectile {
      position: absolute;
      width: 42px;
      height: 42px;
      background: url("./assets/red-projectile-arrow.png") center / contain no-repeat;
      transform-origin: center;
      z-index: 9;
      image-rendering: auto;
    }
    .projectile::after {
      content: none;
    }
    .swordCast, .rodCast, .bowPose, .rodPose, .pitchfork, .hoeSwing {
      position: absolute;
      pointer-events: none;
      z-index: 15;
    }
    .swordCast {
      width: 64px;
      height: 64px;
      transform-origin: 15px 50px;
    }
    .swordFrame {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      height: 64px;
      object-fit: contain;
      image-rendering: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
    .rodCast {
      width: 72px;
      height: 72px;
      transform-origin: 8px 59px;
    }
    .rodFrame {
      position: absolute;
      left: 0;
      top: 0;
      width: 72px;
      height: 72px;
      object-fit: contain;
      image-rendering: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
    .bowPose, .rodPose, .pitchfork, .hoeSwing {
      width: 116px;
      height: 96px;
      transform-origin: 18px 48px;
    }
    .bowPose {
      width: 72px;
      height: 72px;
      transform-origin: 18px 43px;
    }
    .hoeSwing {
      width: 64px;
      height: 64px;
      transform-origin: 12px 52px;
    }
    .bowFrame {
      position: absolute;
      left: 0;
      top: 0;
      width: 72px;
      height: 72px;
      object-fit: contain;
      image-rendering: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
    .hoeFrame {
      position: absolute;
      left: 0;
      top: 0;
      width: 64px;
      height: 64px;
      object-fit: contain;
      image-rendering: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
    .rodPose::before { content: "🎣"; position: absolute; left: 30px; top: 14px; font-size: 56px; filter: drop-shadow(2px 2px 0 #111); }
    .pitchfork::before { content: "🔱"; position: absolute; left: 32px; top: 16px; font-size: 56px; filter: drop-shadow(2px 2px 0 #111); }
    .hoeSwing::before { content: none; }
    .pullLine {
      position: absolute;
      height: 5px;
      background: repeating-linear-gradient(90deg, #111 0 8px, #eee 8px 14px);
      border-radius: 999px;
      transform-origin: 0 50%;
      z-index: 14;
      pointer-events: none;
    }
    .pullHook {
      position: absolute;
      font-size: 24px;
      z-index: 16;
      pointer-events: none;
      filter: drop-shadow(2px 2px 0 #111);
    }
    .turret {
      position: absolute;
      width: 42px;
      height: 42px;
      background: url("./assets/red-r-turret.png") center / contain no-repeat;
      z-index: 7;
      image-rendering: auto;
    }
    .wheat {
      position: absolute;
      width: 36px;
      height: 36px;
      z-index: 5;
      filter: drop-shadow(1px 1px 0 #111);
      pointer-events: none;
    }
    .wheat.seed { opacity: 1; transform: scale(.9); }
    .wheat.mature { opacity: 1; transform: scale(1.18); }
    .wheatFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
    .golem {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 4px;
      z-index: 8;
      pointer-events: none;
      filter: drop-shadow(2px 2px 0 #111);
    }
    .golemFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
    .golemHp {
      position: absolute;
      right: -7px;
      bottom: -8px;
      min-width: 26px;
      height: 18px;
      padding: 0 4px;
      border-radius: 999px;
      background: #111;
      color: white;
      border: 1px solid white;
      font-family: system-ui, sans-serif;
      font-size: 11px;
      font-weight: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .floatText {
      position: absolute;
      z-index: 30;
      color: #ff3030;
      font-size: 19px;
      font-weight: 1000;
      text-shadow: 2px 2px white, -1px -1px white, 2px 2px #111;
      pointer-events: none;
      animation: rise .55s ease-out forwards;
    }
    .healText { color: #2aad4a; }
    @keyframes rise {
      from { transform: translateY(0) scale(1); opacity: 1; }
      to { transform: translateY(-32px) scale(1.25); opacity: 0; }
    }
    .particle {
      position: absolute;
      width: 8px;
      height: 8px;
      border: 1px solid rgba(0,0,0,.28);
      z-index: 25;
      pointer-events: none;
      image-rendering: pixelated;
    }
    .particle.blood { background: #d71919; }
    .particle.farm { background: #7fc94d; }
    .particle.harvest { background: #ffd34d; }
  </style>
</head>
<body>
  <main class="phone">
    <div class="titleRow"><span class="redText">Red</span><span class="vs">VS</span><span class="whiteText">White</span></div>

    <section id="arena"><div class="watermark">yourgame.fun</div></section>

    <div class="skillBar redSkills">
      <div class="skill" id="rHook" data-key="Q"><div class="name">釣竿</div><img class="pixelRodIcon" src="./assets/red-q-fishing-rod.webp" alt="" draggable="false"><div class="clock"></div><div class="cd">0</div></div>
      <div class="skill" id="rSword" data-key="W"><div class="name">鐵劍</div><img class="pixelSwordIcon" src="./assets/red-w-sword.png" alt="" draggable="false"><div class="clock"></div><div class="cd">0</div></div>
      <div class="skill" id="rBow" data-key="E"><div class="name">弓箭</div><img class="pixelBowIcon" src="./assets/red-e-bow.png" alt="" draggable="false"><div class="clock"></div><div class="cd">0</div></div>
      <div class="skill" id="rTurret" data-key="R"><div class="name">砲台</div><img class="pixelTurretIcon" src="./assets/red-r-turret.png" alt="" draggable="false"><div class="clock"></div><div class="cd">0</div></div>
    </div>

    <div class="skillBar whiteSkills">
      <div class="skill" id="wFork" data-key="Q"><div class="name">草叉</div><div class="emoji">🔱</div><div class="clock"></div><div class="cd">0</div></div>
      <div class="skill" id="wWheat" data-key="W"><div class="name">種麥</div><img class="pixelWheatIcon" src="./assets/white-w-wheat-mature.png" alt="" draggable="false"><div class="clock"></div><div class="cd">0</div></div>
      <div class="skill" id="wHoe" data-key="E"><div class="name">鋤頭</div><img class="pixelHoeIcon" src="./assets/white-e-hoe.png" alt="" draggable="false"><div class="clock"></div><div class="cd">0</div></div>
      <div class="skill" id="wGolem" data-key="R"><div class="name">鐵巨人</div><img class="pixelGolemIcon" src="./assets/white-r-golem.png" alt="" draggable="false"><div class="clock"></div><div class="cd">0</div></div>
    </div>

    <div class="hint">
      <span>白球能量：<b id="energyText">0</b>/10　鐵巨人：<b id="golemText">0</b></span>
      <span><button id="pauseBtn">暫停</button> <button id="resetBtn">重開</button></span>
    </div>
  </main>

<script>
(() => {
  'use strict';

  const arena = document.getElementById('arena');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const energyText = document.getElementById('energyText');
  const golemText = document.getElementById('golemText');

  const BALL_R = 28;
  const GOLEM_R = 28;
  const MIN_BALL_SPEED = 1.8;
  const MAX_BALL_SPEED = 3.0;
  const SKILL_CAST_LOCK = {
    hook: .35,
    sword: .45,
    bow: .34,
    turret: .25,
    fork: .24,
    wheat: .25,
    hoe: .34,
    golem: .35
  };
  const FALLBACK_RED_SWORD_SRC = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges"%3E%3Crect width="128" height="128" fill="none"/%3E%3Crect x="74" y="0" width="10" height="10" fill="%23f6f6f6"/%3E%3Crect x="64" y="10" width="20" height="10" fill="%23d6d6d6"/%3E%3Crect x="74" y="10" width="10" height="10" fill="%23ffffff"/%3E%3Crect x="54" y="20" width="20" height="10" fill="%23bdbdbd"/%3E%3Crect x="64" y="20" width="20" height="10" fill="%23eeeeee"/%3E%3Crect x="74" y="20" width="10" height="10" fill="%23ffffff"/%3E%3Crect x="44" y="30" width="20" height="10" fill="%23a6a6a6"/%3E%3Crect x="54" y="30" width="20" height="10" fill="%23dedede"/%3E%3Crect x="64" y="30" width="10" height="10" fill="%23ffffff"/%3E%3Crect x="34" y="40" width="20" height="10" fill="%238e8e8e"/%3E%3Crect x="44" y="40" width="20" height="10" fill="%23d2d2d2"/%3E%3Crect x="54" y="40" width="10" height="10" fill="%23f7f7f7"/%3E%3Crect x="24" y="50" width="20" height="10" fill="%23757575"/%3E%3Crect x="34" y="50" width="20" height="10" fill="%23c2c2c2"/%3E%3Crect x="44" y="50" width="10" height="10" fill="%23efefef"/%3E%3Crect x="14" y="60" width="20" height="10" fill="%23636363"/%3E%3Crect x="24" y="60" width="20" height="10" fill="%23b0b0b0"/%3E%3Crect x="34" y="60" width="10" height="10" fill="%23e6e6e6"/%3E%3Crect x="20" y="66" width="28" height="12" fill="%23505050"/%3E%3Crect x="0" y="60" width="20" height="18" fill="%23646464"/%3E%3Crect x="28" y="72" width="14" height="14" fill="%23603805"/%3E%3Crect x="18" y="82" width="14" height="14" fill="%239a6a12"/%3E%3Crect x="8" y="92" width="14" height="14" fill="%235d3a08"/%3E%3Crect x="0" y="106" width="20" height="10" fill="%23656565"/%3E%3C/svg%3E';
  const redSwordIcon = document.querySelector('#rSword .pixelSwordIcon');
  const RED_SWORD_SRC = redSwordIcon.getAttribute('src');
  redSwordIcon.addEventListener('error', () => {
    redSwordIcon.src = FALLBACK_RED_SWORD_SRC;
  }, { once: true });
  const redRodIcon = document.querySelector('#rHook .pixelRodIcon');
  const RED_ROD_SRC = redRodIcon.getAttribute('src');
  const redBowIcon = document.querySelector('#rBow .pixelBowIcon');
  const RED_BOW_SRC = redBowIcon.getAttribute('src');
  const whiteWheatIcon = document.querySelector('#wWheat .pixelWheatIcon');
  const WHITE_WHEAT_MATURE_SRC = whiteWheatIcon.getAttribute('src');
  const WHITE_WHEAT_SEED_SRC = './assets/white-w-wheat-seed.png';
  const whiteHoeIcon = document.querySelector('#wHoe .pixelHoeIcon');
  const WHITE_HOE_SRC = whiteHoeIcon.getAttribute('src');
  const whiteGolemIcon = document.querySelector('#wGolem .pixelGolemIcon');
  const WHITE_GOLEM_SRC = whiteGolemIcon.getAttribute('src');

  function redSwordSrc() {
    return redSwordIcon.currentSrc || redSwordIcon.src || RED_SWORD_SRC || FALLBACK_RED_SWORD_SRC;
  }

  function redRodSrc() {
    return redRodIcon.currentSrc || redRodIcon.src || RED_ROD_SRC;
  }

  function redBowSrc() {
    return redBowIcon.currentSrc || redBowIcon.src || RED_BOW_SRC;
  }

  function whiteWheatMatureSrc() {
    return whiteWheatIcon.currentSrc || whiteWheatIcon.src || WHITE_WHEAT_MATURE_SRC;
  }

  function whiteHoeSrc() {
    return whiteHoeIcon.currentSrc || whiteHoeIcon.src || WHITE_HOE_SRC;
  }

  function whiteGolemSrc() {
    return whiteGolemIcon.currentSrc || whiteGolemIcon.src || WHITE_GOLEM_SRC;
  }

  const redSkillUI = {
    hook: document.getElementById('rHook'),
    sword: document.getElementById('rSword'),
    bow: document.getElementById('rBow'),
    turret: document.getElementById('rTurret')
  };
  const whiteSkillUI = {
    fork: document.getElementById('wFork'),
    wheat: document.getElementById('wWheat'),
    hoe: document.getElementById('wHoe'),
    golem: document.getElementById('wGolem')
  };

  const redSkills = {
    hook: { cd: 7, last: -999 },
    sword: { cd: 2, last: -999 },
    bow: { cd: 5, last: -999 },
    turret: { cd: 20, last: -999 }
  };
  const whiteSkills = {
    fork: { cd: 2, last: -999 },
    wheat: { cd: 5, last: -999 },
    hoe: { cd: 3, last: -999 },
    golem: { cd: 20, last: -999 }
  };

  const state = {
    paused: false,
    over: false,
    lastReal: performance.now() / 1000,
    gameTime: 0,
    hitStopUntil: 0,
    skillLockUntil: 0,
    red: null,
    white: null,
    energy: 0,
    projectiles: [],
    turrets: [],
    wheats: [],
    golems: [],
    effects: []
  };

  const now = () => performance.now() / 1000;
  const arenaSize = () => arena.clientWidth;
  const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
  const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
  const angleTo = (ax, ay, bx, by) => Math.atan2(by - ay, bx - ax);

  function rotatePointAround(x, y, px, py, angle) {
    const dx = x - px;
    const dy = y - py;
    const c = Math.cos(angle);
    const s = Math.sin(angle);
    return { x: px + dx * c - dy * s, y: py + dx * s + dy * c };
  }

  function circleHitsSegment(cx, cy, radius, x1, y1, x2, y2, padding = 0) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq < 0.001) return dist(cx, cy, x1, y1) <= radius + padding;
    const t = clamp(((cx - x1) * dx + (cy - y1) * dy) / lenSq, 0, 1);
    const hitX = x1 + dx * t;
    const hitY = y1 + dy * t;
    return dist(cx, cy, hitX, hitY) <= radius + padding;
  }

  function localPointToWorld(originX, originY, originLocalX, originLocalY, localX, localY, angle) {
    return rotatePointAround(
      originX + localX - originLocalX,
      originY + localY - originLocalY,
      originX,
      originY,
      angle
    );
  }

  function wheatCenter(crop) {
    return { x: crop.x + 18, y: crop.y + 18 };
  }

  function el(cls, text = '') {
    const node = document.createElement('div');
    node.className = cls;
    node.textContent = text;
    arena.appendChild(node);
    return node;
  }

  function randVel(speed) {
    const a = Math.random() * Math.PI * 2;
    return { vx: Math.cos(a) * speed, vy: Math.sin(a) * speed };
  }

  function normalizeSpeed(body, minSpeed, maxSpeed) {
    const speed = Math.hypot(body.vx, body.vy);
    if (speed < 0.001) {
      const a = Math.random() * Math.PI * 2;
      body.vx = Math.cos(a) * minSpeed;
      body.vy = Math.sin(a) * minSpeed;
      return;
    }
    if (speed < minSpeed || speed > maxSpeed) {
      const target = Math.max(minSpeed, Math.min(maxSpeed, speed));
      body.vx = body.vx / speed * target;
      body.vy = body.vy / speed * target;
    }
  }

  function clearArena() {
    [...arena.children].forEach(child => {
      if (!child.classList.contains('watermark')) child.remove();
    });
  }

  function makeBall(kind, x, y, hp) {
    const v = randVel(kind === 'red' ? 1.9 : 2.0);
    return {
      kind,
      x, y,
      vx: kind === 'red' ? Math.abs(v.vx) : -Math.abs(v.vx),
      vy: kind === 'red' ? Math.abs(v.vy) : -Math.abs(v.vy),
      hp,
      maxHp: kind === 'red' ? 160 : 320,
      radius: BALL_R,
      node: el(`ball ${kind === 'red' ? 'redBall' : 'whiteBall'}`, String(hp))
    };
  }

  function reset() {
    clearArena();
    state.paused = false;
    state.over = false;
    state.lastReal = now();
    state.gameTime = 0;
    state.hitStopUntil = 0;
    state.skillLockUntil = 0;
    state.energy = 0;
    state.red = makeBall('red', 72, 95, 160);
    state.white = makeBall('white', arenaSize() - 110, arenaSize() - 110, 260);
    state.projectiles = [];
    state.turrets = [];
    state.wheats = [];
    state.golems = [];
    state.effects = [];
    Object.values(redSkills).forEach(s => s.last = -999);
    Object.values(whiteSkills).forEach(s => s.last = -999);
    pauseBtn.textContent = '暫停';
  }

  function bounceBody(body, radius) {
    const max = arenaSize() - radius * 2;
    if (body.x < 0) { body.x = 0; body.vx = Math.abs(body.vx); }
    if (body.y < 0) { body.y = 0; body.vy = Math.abs(body.vy); }
    if (body.x > max) { body.x = max; body.vx = -Math.abs(body.vx); }
    if (body.y > max) { body.y = max; body.vy = -Math.abs(body.vy); }
  }

  function floatText(x, y, text, cls = '') {
    const node = el(`floatText ${cls}`.trim(), text);
    node.style.left = `${x}px`;
    node.style.top = `${y}px`;
    setTimeout(() => node.remove(), 700);
  }

  function makeParticles(x, y, type, count = 14, baseAngle = Math.random() * Math.PI * 2) {
    for (let i = 0; i < count; i++) {
      const node = el(`particle ${type}`);
      const a = baseAngle + (Math.random() - .5) * 1.8;
      const speed = type === 'blood' ? 2.5 + Math.random() * 3.2 : 1.2 + Math.random() * 3.0;
      const life = .25 + Math.random() * .35;
      const obj = {
        x: x + (Math.random() - .5) * 20,
        y: y + (Math.random() - .5) * 20,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed - (type === 'harvest' ? 1.2 : .3),
        life,
        maxLife: life,
        node,
        update(dt) {
          this.life -= dt;
          this.x += this.vx;
          this.y += this.vy;
          this.vy += type === 'blood' ? .18 : .12;
          this.node.style.left = `${this.x}px`;
          this.node.style.top = `${this.y}px`;
          this.node.style.opacity = `${Math.max(0, this.life / this.maxLife)}`;
        },
        remove() { this.node.remove(); }
      };
      state.effects.push(obj);
    }
  }

  function hurtVisual(target, fromX, fromY, radius = target.radius, particleCount = 14) {
    const cx = target.x + radius;
    const cy = target.y + radius;
    target.node.classList.remove('hurtFlash');
    void target.node.offsetWidth;
    target.node.classList.add('hurtFlash');
    setTimeout(() => target.node && target.node.classList.remove('hurtFlash'), 180);
    makeParticles(cx, cy, 'blood', particleCount, angleTo(fromX, fromY, cx, cy));
  }

  function hitStop(seconds) {
    state.hitStopUntil = Math.max(state.hitStopUntil, now() + seconds);
  }

  function applyDamageMotion(body, dmg, fromX, fromY, radius, knock, pushScale, stop, particleCount) {
    const cx = body.x + radius;
    const cy = body.y + radius;
    const a = angleTo(fromX, fromY, cx, cy);
    body.hp -= dmg;
    body.vx += Math.cos(a) * knock;
    body.vy += Math.sin(a) * knock;
    body.x += Math.cos(a) * knock * pushScale;
    body.y += Math.sin(a) * knock * pushScale;
    hurtVisual(body, fromX, fromY, radius, particleCount);
    hitStop(stop);
    floatText(body.x + 8, body.y - 14, `-${dmg}`);
  }

  function damageBall(ball, dmg, fromX, fromY, knock = 5, stop = .18) {
    applyDamageMotion(ball, dmg, fromX, fromY, ball.radius, knock, .7, stop, 14);
    if (ball.hp <= 0) endGame(ball.kind === 'red' ? '白球獲勝！' : '紅球獲勝！');
  }

  function damageGolem(g, dmg, fromX, fromY, knock = 4.5, stop = .16) {
    if (g.hp <= 0) return;
    applyDamageMotion(g, dmg, fromX, fromY, GOLEM_R, knock, .55, stop, 12);
    g.knockbackUntil = Math.max(g.knockbackUntil || 0, state.gameTime + .35);
    g.hpText.textContent = Math.max(0, Math.ceil(g.hp));
    if (g.hp <= 0) removeFrom(state.golems, g);
  }

  function redTargets() {
    const list = [{ type: 'white', ref: state.white, x: state.white.x + BALL_R, y: state.white.y + BALL_R, radius: BALL_R }];
    state.golems.forEach(g => {
      if (g.hp > 0) list.push({ type: 'golem', ref: g, x: g.x + GOLEM_R, y: g.y + GOLEM_R, radius: GOLEM_R });
    });
    return list;
  }

  function nearestRedTarget() {
    const rx = state.red.x + BALL_R;
    const ry = state.red.y + BALL_R;
    return redTargets().reduce((best, cur) => {
      if (!best) return cur;
      return dist(rx, ry, cur.x, cur.y) < dist(rx, ry, best.x, best.y) ? cur : best;
    }, null);
  }

  function damageRedTarget(target, dmg, fromX, fromY, knock, stop) {
    if (!target) return;
    if (target.type === 'white') damageBall(target.ref, dmg, fromX, fromY, knock, stop);
    if (target.type === 'golem' && target.ref.hp > 0) damageGolem(target.ref, dmg, fromX, fromY, knock, stop);
  }

  function canUse(skill) {
    return state.gameTime >= state.skillLockUntil && state.gameTime - skill.last >= skill.cd && !state.over;
  }

  function lockSkills(name) {
    state.skillLockUntil = Math.max(state.skillLockUntil, state.gameTime + (SKILL_CAST_LOCK[name] || .25));
  }

  function startEffect(node, life, update) {
    const obj = { node, life, maxLife: life, update, remove() { this.node.remove(); } };
    state.effects.push(obj);
    return obj;
  }

  function redUse(name) {
    const skill = redSkills[name];
    if (!canUse(skill)) return false;
    const target = nearestRedTarget();
    if (!target) return false;
    skill.last = state.gameTime;
    lockSkills(name);

    const rx = state.red.x + BALL_R;
    const ry = state.red.y + BALL_R;
    const a = angleTo(rx, ry, target.x, target.y);

    if (name === 'sword') {
      const node = el('swordCast');
      const swordFrame = document.createElement('img');
      swordFrame.className = 'swordFrame';
      swordFrame.src = redSwordSrc();
      swordFrame.addEventListener('error', () => {
        swordFrame.src = FALLBACK_RED_SWORD_SRC;
      }, { once: true });
      swordFrame.alt = '';
      swordFrame.draggable = false;
      node.appendChild(swordFrame);
      const hitTargets = new Set();
      startEffect(node, .45, function(dt) {
        this.life -= dt;
        const p = 1 - this.life / this.maxLife;
        const ballX = state.red.x + BALL_R;
        const ballY = state.red.y + BALL_R;
        const swordAngle = a - 1.25 + p * 2.5;
        const bladeDir = swordAngle + Math.atan2(-46, 34);
        const swordX = ballX + Math.cos(bladeDir) * (BALL_R + 1);
        const swordY = ballY + Math.sin(bladeDir) * (BALL_R + 1);
        const bladeA = rotatePointAround(swordX + 22, swordY - 13, swordX, swordY, swordAngle);
        const bladeB = rotatePointAround(swordX + 50, swordY - 46, swordX, swordY, swordAngle);
        node.style.left = `${swordX - 15}px`;
        node.style.top = `${swordY - 50}px`;
        node.style.transform = `rotate(${swordAngle}rad)`;
        node.style.opacity = '1';

        for (const cur of redTargets()) {
          if (hitTargets.has(cur.ref)) continue;
          if (circleHitsSegment(cur.x, cur.y, cur.radius, bladeA.x, bladeA.y, bladeB.x, bladeB.y, 7)) {
            hitTargets.add(cur.ref);
            damageRedTarget(cur, 16, swordX, swordY, 6.8, .22);
          }
        }
      });
    }

    if (name === 'hook') {
      const rod = el('rodCast');
      const rodFrame = document.createElement('img');
      rodFrame.className = 'rodFrame';
      rodFrame.src = redRodSrc();
      rodFrame.alt = '';
      rodFrame.draggable = false;
      rod.appendChild(rodFrame);
      startEffect(rod, .35, function(dt) {
        this.life -= dt;
        const p = 1 - this.life / this.maxLife;
        const hooked = p >= .28;
        const pull = Math.max(0, (p - .28) / .72);
        const rcx = state.red.x + BALL_R;
        const rcy = state.red.y + BALL_R;
        const tx = target.type === 'white' ? target.ref.x + BALL_R : target.ref.x + GOLEM_R;
        const ty = target.type === 'white' ? target.ref.y + BALL_R : target.ref.y + GOLEM_R;

        rod.style.left = `${rcx - 8}px`;
        rod.style.top = `${rcy - 59}px`;
        rod.style.transform = `rotate(${angleTo(rcx, rcy, tx, ty) + .75 + Math.sin(p * Math.PI * 3) * .10}rad)`;
        rod.style.opacity = `${1 - Math.max(0, p - .72) * 3.6}`;

        if (hooked && (target.type !== 'golem' || target.ref.hp > 0)) {
          const dx = rcx - tx;
          const dy = rcy - ty;
          const d = Math.max(1, Math.hypot(dx, dy));
          target.ref.vx += dx / d * (.7 + pull * .9);
          target.ref.vy += dy / d * (.7 + pull * .9);
          target.ref.x += dx / d * (.7 + pull * 1.35);
          target.ref.y += dy / d * (.7 + pull * 1.35);
        }
      });
    }

    if (name === 'bow') {
      const node = el('bowPose');
      const bowFrame = document.createElement('img');
      bowFrame.className = 'bowFrame';
      bowFrame.src = redBowSrc();
      bowFrame.alt = '';
      bowFrame.draggable = false;
      node.appendChild(bowFrame);
      const fx = rx, fy = ry, tx = target.x, ty = target.y;
      const obj = startEffect(node, .34, function(dt) {
        this.life -= dt;
        const p = 1 - this.life / this.maxLife;
        node.style.left = `${state.red.x + BALL_R - 18 - Math.sin(p * Math.PI) * 8}px`;
        node.style.top = `${state.red.y + BALL_R - 43}px`;
        node.style.transform = `rotate(${angleTo(fx, fy, tx, ty)}rad)`;
        node.style.opacity = `${1 - Math.max(0, p - .75) * 4}`;
        if (!this.fired && p >= .55) {
          shootProjectile(fx, fy, tx, ty, 18, 'red');
          this.fired = true;
        }
      });
      obj.fired = false;
    }

    if (name === 'turret') {
      const node = el('turret');
      const x = clamp(state.red.x + 10, 4, arenaSize() - 40);
      const y = clamp(state.red.y + 62, 4, arenaSize() - 40);
      node.style.left = `${x}px`;
      node.style.top = `${y}px`;
      state.turrets.push({ x: x + 21, y: y + 21, node, born: state.gameTime, lastShot: state.gameTime - 2.8, life: 10 });
    }
    return true;
  }

  function whiteUse(name) {
    const skill = whiteSkills[name];
    if (!canUse(skill)) return false;
    if (name === 'golem' && state.energy < 10) return false;
    skill.last = state.gameTime;
    lockSkills(name);

    const w = state.white;
    const wx = w.x + BALL_R;
    const wy = w.y + BALL_R;
    const rx = state.red.x + BALL_R;
    const ry = state.red.y + BALL_R;
    const a = angleTo(wx, wy, rx, ry);

    if (name === 'fork') {
      const node = el('pitchfork');
      startEffect(node, .24, function(dt) {
        this.life -= dt;
        const p = 1 - this.life / this.maxLife;
        const lunge = Math.sin(p * Math.PI) * 30;
        node.style.left = `${w.x + BALL_R - 22 + Math.cos(a) * lunge}px`;
        node.style.top = `${w.y + BALL_R - 48 + Math.sin(a) * lunge}px`;
        node.style.transform = `rotate(${a}rad)`;
        node.style.opacity = `${1 - Math.max(0, p - .75) * 4}`;
      });
      if (dist(wx, wy, rx, ry) < 135) damageBall(state.red, 10, wx, wy, 5.8, .18);
    }

    if (name === 'wheat') {
      for (let i = 0; i < 4; i++) schedule(i * .5, () => plantWheat());
    }

    if (name === 'hoe') {
      const targetCrop = nearestMatureWheat(wx, wy);
      const targetCenter = targetCrop ? wheatCenter(targetCrop) : null;
      const hoeAim = targetCenter ? angleTo(wx, wy, targetCenter.x, targetCenter.y) : a;
      const node = el('hoeSwing');
      const hoeFrame = document.createElement('img');
      hoeFrame.className = 'hoeFrame';
      hoeFrame.src = whiteHoeSrc();
      hoeFrame.alt = '';
      hoeFrame.draggable = false;
      node.appendChild(hoeFrame);
      const harvested = new Set();
      const originX = 12;
      const originY = 52;
      const headVectorAngle = Math.atan2(-40, 28);
      startEffect(node, .34, function(dt) {
        this.life -= dt;
        const p = 1 - this.life / this.maxLife;
        const hoeAngle = hoeAim - headVectorAngle - 1.15 + p * 2.3;
        const headDir = hoeAngle + headVectorAngle;
        const pivotX = state.white.x + BALL_R + Math.cos(headDir) * (BALL_R + 1);
        const pivotY = state.white.y + BALL_R + Math.sin(headDir) * (BALL_R + 1);
        const headA = localPointToWorld(pivotX, pivotY, originX, originY, 20, 8, hoeAngle);
        const headB = localPointToWorld(pivotX, pivotY, originX, originY, 52, 15, hoeAngle);
        const handleA = localPointToWorld(pivotX, pivotY, originX, originY, 10, 58, hoeAngle);
        const handleB = localPointToWorld(pivotX, pivotY, originX, originY, 43, 23, hoeAngle);

        node.style.left = `${pivotX - originX}px`;
        node.style.top = `${pivotY - originY}px`;
        node.style.transform = `rotate(${hoeAngle}rad)`;
        node.style.opacity = `${1 - Math.max(0, p - .78) * 4}`;

        harvestWheat(crop => {
          if (harvested.has(crop)) return false;
          const center = wheatCenter(crop);
          const hit = circleHitsSegment(center.x, center.y, 14, headA.x, headA.y, headB.x, headB.y, 10)
            || circleHitsSegment(center.x, center.y, 14, handleA.x, handleA.y, handleB.x, handleB.y, 5);
          if (hit) harvested.add(crop);
          return hit;
        });
      });
    }

    if (name === 'golem') {
      state.energy -= 10;
      spawnGolem();
    }
    return true;
  }

  function schedule(delay, fn) {
    state.effects.push({
      life: delay,
      update(dt) { this.life -= dt; },
      remove() { fn(); }
    });
  }

  function plantWheat() {
    const w = state.white;
    const x = clamp(w.x + BALL_R + Math.random() * 130 - 65, 6, arenaSize() - 42);
    const y = clamp(w.y + BALL_R + Math.random() * 130 - 65, 6, arenaSize() - 42);
    const node = el('wheat seed');
    const frame = document.createElement('img');
    frame.className = 'wheatFrame';
    frame.src = WHITE_WHEAT_SEED_SRC;
    frame.alt = '';
    frame.draggable = false;
    node.appendChild(frame);
    node.style.left = `${x}px`;
    node.style.top = `${y}px`;
    const crop = { x, y, node, frame, mature: false, matureAt: state.gameTime + 5 };
    const center = wheatCenter(crop);
    makeParticles(center.x, center.y, 'farm', 12);
    state.wheats.push(crop);
  }

  function harvestWheat(hitTest) {
    let count = 0;
    for (const crop of [...state.wheats]) {
      if (crop.mature && hitTest(crop)) {
        const center = wheatCenter(crop);
        makeParticles(center.x, center.y, 'harvest', 18);
        crop.node.remove();
        state.wheats = state.wheats.filter(c => c !== crop);
        count++;
      }
    }
    if (count > 0) {
      state.white.hp = Math.min(state.white.maxHp, state.white.hp + count * 2);
      state.energy = Math.min(10, state.energy + count);
      floatText(state.white.x + 16, state.white.y - 16, `+${count * 2}`, 'healText');
      floatText(arenaSize() - 86, 8, `+${count} EN`, 'healText');
    }
  }

  function nearestMatureWheat(x, y) {
    return state.wheats.reduce((best, crop) => {
      if (!crop.mature) return best;
      if (!best) return crop;
      const cropCenter = wheatCenter(crop);
      const bestCenter = wheatCenter(best);
      return dist(x, y, cropCenter.x, cropCenter.y) < dist(x, y, bestCenter.x, bestCenter.y) ? crop : best;
    }, null);
  }

  function spawnGolem() {
    const node = el('golem');
    const frame = document.createElement('img');
    frame.className = 'golemFrame';
    frame.src = whiteGolemSrc();
    frame.alt = '';
    frame.draggable = false;
    node.appendChild(frame);
    const hpText = document.createElement('div');
    hpText.className = 'golemHp';
    hpText.textContent = '90';
    node.appendChild(hpText);
    const x = clamp(state.white.x + 18, 4, arenaSize() - 56);
    const y = clamp(state.white.y - 62, 4, arenaSize() - 56);
    node.style.left = `${x}px`;
    node.style.top = `${y}px`;
    state.golems.push({ x, y, vx: 0, vy: 0, hp: 90, node, frame, hpText, born: state.gameTime, life: 16, lastPunch: -999, knockbackUntil: 0 });
    floatText(x, y - 18, 'GOLEM!', 'healText');
  }

  function separateGolemFromRed(g) {
    const red = state.red;
    let gx = g.x + GOLEM_R;
    let gy = g.y + GOLEM_R;
    let rx = red.x + BALL_R;
    let ry = red.y + BALL_R;
    const minDist = GOLEM_R + BALL_R;
    let d = dist(gx, gy, rx, ry);
    if (d >= minDist) return false;

    let nx;
    let ny;
    if (d < .001) {
      const a = Math.atan2(red.vy || 1, red.vx || 0);
      nx = Math.cos(a);
      ny = Math.sin(a);
      d = .001;
    } else {
      nx = (rx - gx) / d;
      ny = (ry - gy) / d;
    }

    const overlap = minDist - d;
    red.x = clamp(red.x + nx * (overlap + 2), 0, arenaSize() - BALL_R * 2);
    red.y = clamp(red.y + ny * (overlap + 2), 0, arenaSize() - BALL_R * 2);
    g.x = clamp(g.x - nx * overlap * .25, 0, arenaSize() - GOLEM_R * 2);
    g.y = clamp(g.y - ny * overlap * .25, 0, arenaSize() - GOLEM_R * 2);
    red.vx += nx * 2.8;
    red.vy += ny * 2.8;

    gx = g.x + GOLEM_R;
    gy = g.y + GOLEM_R;
    rx = red.x + BALL_R;
    ry = red.y + BALL_R;
    d = Math.max(.001, dist(gx, gy, rx, ry));
    if (d < minDist) {
      const remain = minDist - d;
      g.x = clamp(g.x - nx * remain, 0, arenaSize() - GOLEM_R * 2);
      g.y = clamp(g.y - ny * remain, 0, arenaSize() - GOLEM_R * 2);
    }
    return true;
  }

  function shootProjectile(x1, y1, x2, y2, dmg, owner) {
    const a = angleTo(x1, y1, x2, y2);
    const node = el('projectile');
    state.projectiles.push({ x: x1, y: y1, vx: Math.cos(a) * 6.9, vy: Math.sin(a) * 6.9, dmg, owner, node, life: 3, angle: a });
  }

  function updateProjectiles(dt) {
    for (const p of [...state.projectiles]) {
      p.life -= dt;
      p.x += p.vx;
      p.y += p.vy;
      p.node.style.left = `${p.x - 21}px`;
      p.node.style.top = `${p.y - 21}px`;
      p.node.style.transform = `rotate(${p.angle + Math.PI / 4}rad)`;

      if (p.owner === 'red') {
        for (const target of redTargets()) {
          if (dist(p.x, p.y, target.x, target.y) < target.radius) {
            damageRedTarget(target, p.dmg, p.x - p.vx * 2, p.y - p.vy * 2, p.dmg >= 18 ? 6.2 : 4.8, .20);
            p.life = 0;
            break;
          }
        }
      }

      if (p.x < -60 || p.y < -60 || p.x > arenaSize() + 60 || p.y > arenaSize() + 60) p.life = 0;
      if (p.life <= 0) removeFrom(state.projectiles, p);
    }
  }

  function updateTurrets() {
    for (const t of [...state.turrets]) {
      if (state.gameTime - t.born > t.life) { removeFrom(state.turrets, t); continue; }
      if (state.gameTime - t.lastShot >= 3) {
        const target = nearestRedTarget();
        if (target) shootProjectile(t.x, t.y, target.x, target.y, 10, 'red');
        t.lastShot = state.gameTime;
      }
    }
  }

  function updateWheat() {
    for (const crop of state.wheats) {
      if (!crop.mature && state.gameTime >= crop.matureAt) {
        crop.mature = true;
        crop.node.className = 'wheat mature';
        crop.frame.src = whiteWheatMatureSrc();
        const center = wheatCenter(crop);
        makeParticles(center.x, center.y, 'farm', 12);
      }
    }
  }

  function updateGolems() {
    const red = state.red;
    for (const g of [...state.golems]) {
      if (g.hp <= 0 || state.gameTime - g.born > g.life) { removeFrom(state.golems, g); continue; }
      const gx = g.x + GOLEM_R, gy = g.y + GOLEM_R;
      const rx = red.x + BALL_R, ry = red.y + BALL_R;
      const a = angleTo(gx, gy, rx, ry);
      const knockedBack = state.gameTime < (g.knockbackUntil || 0);
      if (!knockedBack) {
        g.vx += Math.cos(a) * .08;
        g.vy += Math.sin(a) * .08;
      }
      g.vx *= knockedBack ? .97 : .94;
      g.vy *= knockedBack ? .97 : .94;
      g.x += g.vx; g.y += g.vy;
      g.x = clamp(g.x, 0, arenaSize() - GOLEM_R * 2);
      g.y = clamp(g.y, 0, arenaSize() - GOLEM_R * 2);
      const collided = separateGolemFromRed(g);
      g.node.style.left = `${g.x}px`;
      g.node.style.top = `${g.y}px`;
      const newGx = g.x + GOLEM_R;
      const newGy = g.y + GOLEM_R;
      const newRx = red.x + BALL_R;
      const newRy = red.y + BALL_R;
      if ((collided || dist(newGx, newGy, newRx, newRy) < 78) && state.gameTime - g.lastPunch > 1.2) {
        damageBall(red, 16, newGx, newGy, 15.5, .26);
        floatText(red.x + 4, red.y - 24, 'SMASH!');
        g.lastPunch = state.gameTime;
      }
    }
  }

  function removeFrom(arr, obj) {
    if (typeof obj.remove === 'function') obj.remove();
    else if (obj.node) obj.node.remove();
    const i = arr.indexOf(obj);
    if (i >= 0) arr.splice(i, 1);
  }

  function updateEffects(dt) {
    for (const fx of [...state.effects]) {
      if (fx.update) fx.update(dt);
      if (fx.life <= 0) removeFrom(state.effects, fx);
    }
  }

  function collideBalls() {
    const a = state.red, b = state.white;
    const ax = a.x + BALL_R, ay = a.y + BALL_R;
    const bx = b.x + BALL_R, by = b.y + BALL_R;
    const d = Math.max(.01, dist(ax, ay, bx, by));
    if (d < BALL_R * 2) {
      const nx = (bx - ax) / d, ny = (by - ay) / d;
      const overlap = BALL_R * 2 - d;
      a.x -= nx * overlap / 2; a.y -= ny * overlap / 2;
      b.x += nx * overlap / 2; b.y += ny * overlap / 2;
      const av = a.vx * nx + a.vy * ny;
      const bv = b.vx * nx + b.vy * ny;
      a.vx += (bv - av) * nx * .45; a.vy += (bv - av) * ny * .45;
      b.vx += (av - bv) * nx * .45; b.vy += (av - bv) * ny * .45;
    }
  }

  function ai() {
    redUse('sword');
    redUse('hook');
    redUse('bow');
    redUse('turret');
    whiteUse('fork');
    whiteUse('wheat');
    whiteUse('hoe');
    whiteUse('golem');
  }

  function updateBodies() {
    for (const b of [state.red, state.white]) {
      b.x += b.vx; b.y += b.vy;
      bounceBody(b, BALL_R);
    }
    collideBalls();
    normalizeSpeed(state.red, MIN_BALL_SPEED, MAX_BALL_SPEED);
    normalizeSpeed(state.white, MIN_BALL_SPEED, MAX_BALL_SPEED);
  }

  function updateSkillUI() {
    updateSkillGroup(redSkills, redSkillUI);
    updateSkillGroup(whiteSkills, whiteSkillUI);
  }

  function updateSkillGroup(skills, ui) {
    for (const [name, skill] of Object.entries(skills)) {
      const remain = Math.max(0, skill.cd - (state.gameTime - skill.last));
      const node = ui[name];
      const clock = node.querySelector('.clock');
      const cd = node.querySelector('.cd');
      if (remain > .05) {
        node.classList.add('cooling');
        clock.style.setProperty('--cool', `${Math.min(1, remain / skill.cd) * 360}deg`);
        cd.textContent = remain >= 10 ? Math.ceil(remain) : remain.toFixed(1);
      } else if (name === 'golem' && state.energy < 10) {
        node.classList.add('cooling');
        clock.style.setProperty('--cool', `${(1 - state.energy / 10) * 360}deg`);
        cd.textContent = `${state.energy}/10`;
      } else {
        node.classList.remove('cooling');
        clock.style.setProperty('--cool', '0deg');
        cd.textContent = '0';
      }
    }
  }

  function render() {
    for (const b of [state.red, state.white]) {
      b.node.style.transform = `translate(${b.x}px, ${b.y}px)`;
      b.node.textContent = Math.max(0, Math.ceil(b.hp));
    }
    energyText.textContent = state.energy;
    golemText.textContent = state.golems.length;
  }

  function endGame(text) {
    if (state.over) return;
    state.over = true;
    state.paused = true;
    setTimeout(() => alert(text), 80);
  }

  function tick() {
    const t = now();
    const dt = Math.min(.033, t - state.lastReal);
    state.lastReal = t;

    if (!state.paused && !state.over) {
      const stopped = t < state.hitStopUntil;
      if (!stopped) {
        state.gameTime += dt;
        updateBodies();
        ai();
        updateProjectiles(dt);
        updateTurrets();
        updateWheat();
        updateGolems();
        updateEffects(dt);
      }
    }

    updateSkillUI();
    render();
    requestAnimationFrame(tick);
  }

  function runDevTests() {
    console.assert(redSkills.hook.cd === 7, 'red hook cooldown should be 7 seconds');
    console.assert(redSkills.sword.cd === 2, 'red sword cooldown should be 2 seconds');
    console.assert(whiteSkills.fork.cd === 2, 'white fork cooldown should be 2 seconds');
    console.assert(whiteSkills.wheat.cd === 5, 'white wheat cooldown should be 5 seconds');
    console.assert(whiteSkills.hoe.cd === 3, 'white hoe cooldown should be 3 seconds');
    console.assert(whiteSkills.golem.cd === 20, 'white golem cooldown should be 20 seconds');
    console.assert(typeof damageGolem === 'function', 'golem must be attackable');
    console.assert(typeof plantWheat === 'function', 'wheat planting must exist');
  }

  pauseBtn.addEventListener('click', () => {
    state.paused = !state.paused;
    pauseBtn.textContent = state.paused ? '繼續' : '暫停';
  });
  resetBtn.addEventListener('click', reset);
  window.addEventListener('resize', reset);

  reset();
  runDevTests();
  tick();
})();
</script>
</body>
</html>
